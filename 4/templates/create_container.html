<!DOCTYPE html>
<html>
<head><title>Create Container</title></head>
<body>
    <h1>Create a New Container</h1>
    <form method="POST">
        <label>Name: <input type="text" name="name"></label><br>
        <label>Image: <input type="text" name="image"></label><br>
        <label>Host Port: <input type="text" name="host_port"></label><br>
        <label>Container Port: <input type="text" name="container_port"></label><br>
        <button type="submit">Create</button>
    </form>
</body>
</html>
